services:
  db:
    image: postgres:18-alpine
    container_name: gradus-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gradus_db}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${DB_PORT:-5432}:5432'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-gradus_db}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build: ./backend
    container_name: gradus-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@db:5432/${POSTGRES_DB:-gradus_db}
      PORT: 3000
      FRONTEND_URL: http://localhost
    ports:
      - '3000:3000'
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/server.js"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000/api
        VITE_ITMO_ENABLED: "false"
    container_name: gradus-frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped

  adminer:
    image: adminer:latest
    restart: always
    ports:
      - '8080:8080'

volumes:
  postgres_data:
    name: gradus-postgres-data
    driver: local
  uploads_data:
    name: gradus-uploads
    driver: local
