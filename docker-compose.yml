services:
  db:
    image: postgres:18-alpine
    container_name: athena-server-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-athena_db}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${DB_PORT:-5432}:5432'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-athena_db}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
  adminer:
    image: adminer:latest
    restart: always
    ports:
      - '8080:8080'

volumes:
  postgres_data:
    name: athena-postgres-data
    driver: local

